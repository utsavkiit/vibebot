# VibeBot configuration
# ---------------------------------------------------------------------------
# LLM settings
# ---------------------------------------------------------------------------
llm:
  # Supported providers: anthropic, openai
  provider: anthropic
  # Any model ID supported by the chosen provider
  model: claude-haiku-4-5-20251001

# ---------------------------------------------------------------------------
# Plugin settings
# Set enabled: true to include a plugin in the daily digest.
# ---------------------------------------------------------------------------
plugins:
  news:
    enabled: true
    article_count: 5   # How many top headlines to include

  stocks:
    enabled: false
    # watchlist: [AAPL, MSFT, TSLA]   # Uncomment when implementing

  real_estate:
    enabled: false
    # location: "San Francisco, CA"   # Uncomment when implementing
    # max_price: 1500000

# ---------------------------------------------------------------------------
# Delivery settings
# ---------------------------------------------------------------------------
delivery:
  max_retries: 3          # Attempts before marking a message as failed
  retry_backoff_base: 2   # Exponential backoff: wait = base^attempt seconds
