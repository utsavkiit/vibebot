# VibeBot configuration
# ---------------------------------------------------------------------------
# LLM settings
# ---------------------------------------------------------------------------
llm:
  # Supported providers: anthropic, openai, ollama
  provider: ollama
  # Any model ID supported by the chosen provider
  model: qwen3:8b

# ---------------------------------------------------------------------------
# Plugin settings
# Set enabled: true to include a plugin in the daily digest.
# ---------------------------------------------------------------------------
plugins:
  news:
    enabled: true
    article_count: 5   # How many top headlines to include

  stocks:
    enabled: false
    # watchlist: [AAPL, MSFT, TSLA]   # Uncomment when implementing

  real_estate:
    enabled: false
    # location: "San Francisco, CA"   # Uncomment when implementing
    # max_price: 1500000

  gnews:
    enabled: true
    article_count: 50
    feed_url: "https://news.google.com/rss"   # Top stories; use /rss/topics/<id> for categories
    embeddings:
      provider: ollama           # ollama | openai
      model: "nomic-embed-text"  # ollama: pull with `ollama pull nomic-embed-text`
      # provider: openai
      # model: text-embedding-3-small   # requires OPENAI_API_KEY in .env

# ---------------------------------------------------------------------------
# Delivery settings
# ---------------------------------------------------------------------------
delivery:
  max_retries: 3          # Attempts before marking a message as failed
  retry_backoff_base: 2   # Exponential backoff: wait = base^attempt seconds
