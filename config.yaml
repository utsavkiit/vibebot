# VibeBot configuration
# ---------------------------------------------------------------------------
# LLM settings
# ---------------------------------------------------------------------------
llm:
  # Supported providers: anthropic, openai, ollama
  provider: ollama
  # Any model ID supported by the chosen provider
  model: qwen3:8b

# ---------------------------------------------------------------------------
# Plugin settings
# Set enabled: true to include a plugin in the daily digest.
# ---------------------------------------------------------------------------
plugins:
  # --- Legacy plugins (disabled) ---
  news:
    enabled: false
    article_count: 5

  stocks:
    enabled: false

  real_estate:
    enabled: false

  gnews:
    enabled: false
    article_count: 50
    feed_url: "https://news.google.com/rss"
    embeddings:
      provider: ollama
      model: "nomic-embed-text"

  # --- Topic digest plugins (staggered hourly via launchd --plugin flag) ---
  us_news:
    enabled: true
    feed_url: "https://news.google.com/rss/search?q=US+news&hl=en-US&gl=US&ceid=US:en"
    story_count: 3
    embeddings:
      provider: ollama
      model: "nomic-embed-text"

  world_news:
    enabled: true
    feed_url: "https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx1YlY4U0FtVnVHZ0pXVGlnQVAB"
    story_count: 3
    embeddings:
      provider: ollama
      model: "nomic-embed-text"

  india_news:
    enabled: true
    feed_url: "https://news.google.com/rss/search?q=India+news&hl=en-IN&gl=IN&ceid=IN:en"
    story_count: 3
    embeddings:
      provider: ollama
      model: "nomic-embed-text"

  sports:
    enabled: true
    feeds:
      f1: "https://news.google.com/rss/search?q=formula+1+f1+racing&hl=en-US&gl=US&ceid=US:en"
      soccer: "https://news.google.com/rss/search?q=soccer+football+premier+league&hl=en-US&gl=US&ceid=US:en"
      cricket: "https://news.google.com/rss/search?q=cricket+test+IPL&hl=en-US&gl=US&ceid=US:en"
      tennis: "https://news.google.com/rss/search?q=tennis+ATP+WTA&hl=en-US&gl=US&ceid=US:en"
    embeddings:
      provider: ollama
      model: "nomic-embed-text"

  tech_news:
    enabled: true
    feed_url: "https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGRqTVhZU0FtVnVHZ0pWVXlnQVAB?hl=en-US&gl=US&ceid=US:en"
    story_count: 3
    embeddings:
      provider: ollama
      model: "nomic-embed-text"

  stocks_news:
    enabled: true
    feed_url: "https://news.google.com/rss/search?q=US+stock+market+NYSE+NASDAQ&hl=en-US&gl=US&ceid=US:en"
    story_count: 3
    embeddings:
      provider: ollama
      model: "nomic-embed-text"

  podcast:
    enabled: true
    tts_url: "http://localhost:8080"
    serve_url: "http://100.104.18.70:8888"
    voice: "af_heart"
    model: "mlx-community/Kokoro-82M-bf16"
    output_dir: "~/VibeBot-Podcasts"
    digest_types:
      - us_news_digest
      - world_news_digest
      - india_news_digest
      - sports_digest
      - tech_news_digest
      - stocks_news_digest

# ---------------------------------------------------------------------------
# Delivery settings
# ---------------------------------------------------------------------------
delivery:
  max_retries: 3          # Attempts before marking a message as failed
  retry_backoff_base: 2   # Exponential backoff: wait = base^attempt seconds
